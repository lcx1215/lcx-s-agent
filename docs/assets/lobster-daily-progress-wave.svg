<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Lobster OpenClaw daily progress wave</title>
  <desc id="desc">A friendly dashboard-style illustration showing a seven day progress wave for Lobster OpenClaw.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7f0"/>
      <stop offset="0.55" stop-color="#f5fbff"/>
      <stop offset="1" stop-color="#f7fff5"/>
    </linearGradient>
    <linearGradient id="wave" x1="110" y1="0" x2="1010" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff7564"/>
      <stop offset="0.48" stop-color="#41a7ff"/>
      <stop offset="1" stop-color="#47c97b"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#243042" flood-opacity="0.12"/>
    </filter>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="2" fill="#263238" opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="420" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="34" fill="url(#dots)"/>

  <g filter="url(#softShadow)">
    <rect x="58" y="48" width="1084" height="320" rx="24" fill="#ffffff" opacity="0.92"/>
  </g>

  <g transform="translate(86 76)">
    <text x="0" y="0" fill="#27323a" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="800">
      Lobster OpenClaw
    </text>
    <text x="0" y="34" fill="#5f6f78" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="500">
      Daily research control room: build, learn, verify, clean.
    </text>
  </g>

  <g transform="translate(946 54)">
