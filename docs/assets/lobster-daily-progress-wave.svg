      <stop offset="0.55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f3fff7"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="136%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#102030" flood-opacity="0.12"/>
