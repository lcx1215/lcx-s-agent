    <path d="M36 51 C 44 58, 53 58, 61 51" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
    <path d="M10 36 C -8 24, -6 8, 8 5 C 20 10, 21 25, 10 36 Z" fill="#ff9a83" stroke="#3a0a0d" stroke-width="4"/>
